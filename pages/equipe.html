<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Equipe - Layout Jurídico</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121d2d; /* Azul marinho profundo */
            --gold: #c5a059;     /* Dourado clássico */
            --gold-glow: rgba(197, 160, 89, 0.5);
            --text-white: #ffffff;
            --text-gray: #b0b8c1;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            letter-spacing: 4px;
            margin: 0;
            font-weight: 400;
            color: var(--gold);
            text-transform: uppercase;
        }

        .header p {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text-gray);
            margin-top: 10px;
            font-weight: 300;
        }

        /* Container do Grid */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas desktop */
            gap: 25px;
            max-width: 1300px;
            width: 100%;
        }

        /* Estilo do Card */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 25px 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
        }

        /* Hover: Borda Dourada Brilha */
        .card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold-glow);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Foto Círculo */
        .photo-area {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid var(--text-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
        }

        .photo-area span {
            font-size: 0.7rem;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        /* Informações do Advogado */
        .info {
            display: flex;
            flex-direction: column;
        }

        .info h3 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.15rem;
            font-weight: 700;
        }

        .info .role {
            font-size: 0.75rem;
            color: var(--text-gray);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .details {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .details li {
            font-size: 0.8rem;
            color: var(--text-white);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 300;
        }

        .details li span {
            color: var(--gold);
            font-size: 0.9rem;
            width: 18px;
            text-align: center;
        }

        /* Responsividade */
        @media (max-width: 1200px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 650px) {
            .team-grid { grid-template-columns: 1fr; } /* Layout Mobile: 1 Coluna */
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOSSA EQUIPE</h1>
        <p>Conhecimento Jurídico e Experiência Comprovada</p>
    </div>

    <div class="team-grid">
        
        <script>
            const totalCards = 8;
            const cardContent = `
                <div class="card">
                    <div class="photo-area"><span>FOTO</span></div>
                    <div class="info">
                        <h3>Nome do Advogado</h3>
                        <span class="role">Sócio / OAB-XX 000.000</span>
                        <ul class="details">
                            <li><span>⚖️</span> Especialidade: Civil</li>
                            <li><span>📖</span> 15+ Anos de Experiência</li>
                            <li><span>🏛️</span> Mestre em Direito</li>
                            <li><span>📄</span> Casos Complexos</li>
                        </ul>
                    </div>
                </div>
            `;
            
            // Renderiza os 8 cards para manter o código limpo
            for (let i = 0; i < totalCards; i++) {
                document.write(cardContent);
            }
        </script>

    </div>

</body>
</html>
