<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Equipe | Advocacia de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --fundo-pagina: #E0E7FF;      /* Azul claro lavanda */
            --cor-azul-escuro: #0c133f;   /* Azul para títulos e detalhes */
            --cor-dourado: #cba776;       /* Dourado para ícones e detalhes */
            --cor-card-fundo: #ffffff;    /* Fundo do card claro e limpo */
            --fonte-titulo: 'Playfair Display', serif;
            --fonte-corpo: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--fundo-pagina);
            color: var(--cor-azul-escuro);
            font-family: var(--fonte-corpo);
            margin: 0;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-family: var(--fonte-titulo);
            font-size: 3rem;
            color: var(--cor-azul-escuro);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            color: #556080;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        header::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--cor-dourado);
            margin: 25px auto;
        }

        /* Grid Responsivo */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Card Estilo "Boutique" Claro */
        .card {
            background-color: var(--cor-card-fundo);
            border: 1px solid rgba(12, 19, 63, 0.05); /* Borda quase invisível */
            padding: 30px 25px;
            display: flex;
            align-items: flex-start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 2px; /* Cantos levemente arredondados para sofisticação */
        }

        /* Efeito Hover do Modelo 1 (Brilho e Borda Dourada) */
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--cor-dourado);
            box-shadow: 0 15px 45px rgba(203, 167, 118, 0.2);
        }

        .photo-area {
            width: 75px;
            height: 75px;
            background-color: var(--fundo-pagina);
            border: 1px solid var(--cor-dourado);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .photo-area i {
            font-size: 1.8rem;
            color: var(--cor-azul-escuro);
        }

        .info h2 {
            font-family: var(--fonte-titulo);
            font-size: 1.2rem;
            color: var(--cor-azul-escuro);
            margin: 0 0 5px 0;
        }

        .cargo {
            display: block;
            font-size: 0.75rem;
            color: var(--cor-dourado);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .details {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .details li {
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            color: #444; /* Texto de leitura suave */
        }

        .details li i {
            color: var(--cor-dourado);
            width: 20px;
            margin-right: 12px;
            font-size: 0.85rem;
        }

        /* Responsividade (Mobile: 1 Coluna) */
        @media (max-width: 1200px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .team-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Nossa Equipe</h1>
        <p>Conhecimento e Experiência</p>
    </header>

    <div class="team-grid" id="grid-equipe">
        </div>

    <script>
        const areas = ["Direito Civil", "Direito Tributário", "Empresarial", "Trabalhista", "Direito Penal", "Direito Digital", "Família", "Imobiliário"];
        const container = document.getElementById('grid-equipe');

        for (let i = 0; i < 8; i++) {
            container.innerHTML += `
                <div class="card">
                    <div class="photo-area">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="info">
                        <h2>Nome do Advogado</h2>
                        <span class="cargo">Sócio / OAB 00.000</span>
                        <ul class="details">
                            <li><i class="fas fa-balance-scale"></i> ${areas[i]}</li>
                            <li><i class="fas fa-check-circle"></i> 15+ Anos de Experiência</li>
                            <li><i class="fas fa-certificate"></i> Mestre em Direito</li>
                            <li><i class="fas fa-briefcase"></i> Casos Complexos</li>
                        </ul>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
