<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossos Serviços | Escritório de Advocacia</title>
  <meta name="description" content="Orientação jurídica especializada com excelência e personalização para atender às suas necessidades.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: hsl(222, 47%, 8%);
      --card: hsl(222, 40%, 12%);
      --foreground: hsl(45, 30%, 96%);
      --muted: hsl(220, 15%, 60%);
      --primary: hsl(42, 55%, 58%); 
      --primary-dark: hsl(222, 47%, 8%);
      --border: hsl(222, 25%, 20%);
      --gold-light: hsl(42, 60%, 70%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 64px 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .header h1 {
      font-size: clamp(2.5rem, 5vw, 3.75rem);
      font-weight: 700;
      margin-bottom: 24px;
    }

    .header h1 .gold {
      background: linear-gradient(135deg, var(--primary) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      max-width: 640px;
      margin: 0 auto;
    }


    .services-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 24px;
    }

    @media (min-width: 640px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
      }
    }

    /* Service Card */
    .service-card {
      background-color: var(--card);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease-out;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease-out forwards;
      
      display: block; 
      text-decoration: none; 
      color: inherit; 
      cursor: pointer;
      border: 1px solid transparent;
    }

    .service-card:nth-child(1) { animation-delay: 0ms; }
    .service-card:nth-child(2) { animation-delay: 100ms; }
    .service-card:nth-child(3) { animation-delay: 200ms; }
    .service-card:nth-child(4) { animation-delay: 300ms; }
    .service-card:nth-child(5) { animation-delay: 400ms; }
    .service-card:nth-child(6) { animation-delay: 500ms; }

    .service-card:hover {
      transform: scale(1.02) translateY(0);
      box-shadow: 0 20px 40px hsla(42, 55%, 58%, 0.25);
      border-color: var(--primary);
    }

    .service-card .image-container {
      overflow: hidden;
    }

    .service-card img {
      width: 100%;
      height: 192px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .service-card:hover img {
      transform: scale(1.05);
    }

    .service-card .content {
      padding: 24px;
    }

    .service-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--foreground);
      transition: color 0.3s ease;
    }

    .service-card:hover h3 {
      color: var(--primary);
    }

    .service-card p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .cta-section {
      text-align: center;
      margin-top: 64px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.7s forwards;
    }

    .cta-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 640px) {
      .cta-buttons {
        flex-direction: row;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--primary-dark);
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .btn-outline {
      background: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Nossos <span class="gold">Serviços</span></h1>
      <p>Orientação jurídica especializada com excelência e personalização para atender às suas necessidades.</p>
    </header>

    <section class="services-grid" id="services">
      </section>

    <section class="cta-section">
      <div class="cta-buttons">
        <a href="#contato" class="btn btn-primary">Agendar Consulta</a>
        <a href="https://wa.me/5511999999999" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
          <svg fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          WhatsApp
        </a>
      </div>
    </section>
  </main>

  <script>
    const services = [
      {
        image: "https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=640&h=400&fit=crop",
        title: "Direito Empresarial",
        description: "Assessoria jurídica completa para empresas, incluindo constituição, contratos, fusões e aquisições, governança corporativa e compliance.",
        link: "#"
      },
      {
        image: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=640&h=400&fit=crop",
        title: "Direito Tributário",
        description: "Planejamento tributário estratégico, defesa em processos administrativos e judiciais, recuperação de créditos e consultoria fiscal.",
        link: "#"
      },
      {
        image: "https://images.unsplash.com/photo-1521791136064-7986c2920216?w=640&h=400&fit=crop",
        title: "Direito Cível",
        description: "Atuação em contratos, responsabilidade civil, cobranças, direito do consumidor e resolução de conflitos de forma ágil e eficiente.",
        link: "#"
      },
      {
        image: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=640&h=400&fit=crop",
        title: "Direito Trabalhista",
        description: "Consultoria preventiva, defesa em reclamações trabalhistas, negociações sindicais e adequação às normas trabalhistas vigentes.",
        link: "#"
      },
      {
        image: "https://images.unsplash.com/photo-1511895426328-dc8714191300?w=640&h=400&fit=crop",
        title: "Direito de Família",
        description: "Divórcios, inventários, partilhas, guarda de filhos, pensão alimentícia e mediação familiar com sensibilidade e profissionalismo.",
        link: "#"
      },
      {
        image: "https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=640&h=400&fit=crop",
        title: "Direito Imobiliário",
        description: "Regularização de imóveis, análise de contratos, incorporações, locações e assessoria em transações imobiliárias complexas.",
        link: "#"
      }
    ];

    function renderServices() {
      const container = document.getElementById('services');
      
      services.forEach((service, index) => {
        const card = document.createElement('a');
        card.className = 'service-card';
        card.href = service.link;
        
        card.innerHTML = `
          <div class="image-container">
            <img src="${service.image}" alt="${service.title}" loading="lazy">
          </div>
          <div class="content">
            <h3>${service.title}</h3>
            <p>${service.description}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', renderServices);
  </script>
</body>
</html>
